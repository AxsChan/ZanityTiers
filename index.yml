  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script>
    // =============================================
    // SUPABASE CONFIG
    // =============================================
    const SUPABASE_URL = 'https://sqvnsyvcxcsckfrruezq.supabase.co'; // ✅ This is correct
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxdm5zeXZjeGNzY2tmcnJ1ZXpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Njc1MTIsImV4cCI6MjA4OTU0MzUxMn0.8PZYAwk3A--v0re9rjdaR8buggFGM6EjEjTvCMBuJew'; // ⚠️ Get this from API settings
    
    // Initialize Supabase Client
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Initialize Supabase Client
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =============================================
    // DATA & STATE
    // =============================================
    let players = [];
    let currentUser = null;
    let realtimeSubscription = null;

    const CATEGORIES = ["sword", "axe", "crystal", "nethpot", "uhc", "smp", "mace"];
    const CAT_ICONS = {
      sword: "sword.png", axe: "axe.png", crystal: "crystal.png",
      nethpot: "nethpot.png", uhc: "uhc.png", smp: "smp.png", mace: "mace.png"
    };

    const POINTS_MAP = {
      "HT1": 60, "LT1": 30, "HT2": 30, "LT2": 15,
      "HT3": 15, "LT3": 14, "HT4": 8, "LT4": 6, "HT5": 4, "LT5": 1
    };

    const TITLES = [
      { min: 400, t: "Grandmaster" },
      { min: 250, t: "Master" },
      { min: 100, t: "Ace" },
      { min: 50, t: "Specialist" },
      { min: 20, t: "Cadet" },
      { min: 10, t: "Novice" },
      { min: 0, t: "Beginner" }
    ];

    // =============================================
    // UTILITY FUNCTIONS
    // =============================================
    function getImageUrl(name, type = 'bust') {
      const cleanName = name ? name.trim() : 'MHF_Steve';
      return type === 'bust' 
        ? `https://vzge.me/bust/${cleanName}` 
        : `https://vzge.me/face/${cleanName}`;
    }

    function getPoints(tier) { return POINTS_MAP[tier] || 0; }
    function getTitle(pts) { return TITLES.find(x => pts >= x.min).t; }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function updateConnectionStatus(status) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      
      if (status === 'connected') {
        dot.className = 'status-dot connected';
        text.textContent = 'Live';
      } else if (status === 'loading') {
        dot.className = 'status-dot loading';
        text.textContent = 'Syncing...';
      } else {
        dot.className = 'status-dot';
        text.textContent = 'Offline';
      }
    }

    function debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    // =============================================
    // SUPABASE DATA OPERATIONS
    // =============================================
    async function loadPlayers() {
      updateConnectionStatus('loading');
      
      try {
        const { data, error } = await supabase
          .from('players')
          .select('*')
          .order('name');
        
        if (error) throw error;
        
        // Transform to expected format
        players = data.map(p => ({
          id: p.id,
          name: p.name,
          cat: p.category,
          tier: p.tier,
          region: p.region,
          tester: p.tester
        }));
        
        updateConnectionStatus('connected');
        return true;
      } catch (err) {
        console.error('Failed to load players:', err);
        updateConnectionStatus('error');
        return false;
      }
    }

    async function addPlayer(playerData) {
      try {
        const { data, error } = await supabase
          .from('players')
          .upsert({
            name: playerData.name,
            category: playerData.category,
            tier: playerData.tier,
            region: playerData.region,
            tester: playerData.tester
          }, { onConflict: 'name,category' })
          .select();
        
        if (error) throw error;
        showToast(`${playerData.name} added to ${playerData.category}!`);
        return data;
      } catch (err) {
        console.error('Add player error:', err);
        showToast(err.message || 'Failed to add player', 'error');
        return null;
      }
    }

    async function updatePlayer(id, updates) {
      try {
        const { error } = await supabase
          .from('players')
          .update(updates)
          .eq('id', id);
        
        if (error) throw error;
        showToast('Player updated!');
        return true;
      } catch (err) {
        console.error('Update error:', err);
        showToast(err.message || 'Failed to update', 'error');
        return false;
      }
    }

    async function deletePlayer(id, name) {
      if (!confirm(`Delete ${name}?`)) return false;
      
      try {
        const { error } = await supabase
          .from('players')
          .delete()
          .eq('id', id);
        
        if (error) throw error;
        showToast(`${name} deleted`);
        return true;
      } catch (err) {
        console.error('Delete error:', err);
        showToast(err.message || 'Failed to delete', 'error');
        return false;
      }
    }

    // =============================================
    // REAL-TIME SUBSCRIPTION
    // =============================================
    function setupRealtimeSubscription() {
      realtimeSubscription = supabase
        .channel('players-changes')
        .on('postgres_changes', { 
          event: '*', 
          schema: 'public', 
          table: 'players' 
        }, (payload) => {
          console.log('Realtime update:', payload);
          handleRealtimeUpdate(payload);
        })
        .subscribe((status) => {
          console.log('Subscription status:', status);
          if (status === 'SUBSCRIBED') {
            updateConnectionStatus('connected');
          }
        });
    }

    async function handleRealtimeUpdate(payload) {
      const { eventType, new: newRecord, old: oldRecord } = payload;
      
      if (eventType === 'INSERT') {
        players.push({
          id: newRecord.id,
          name: newRecord.name,
          cat: newRecord.category,
          tier: newRecord.tier,
          region: newRecord.region,
          tester: newRecord.tester
        });
      } else if (eventType === 'UPDATE') {
        const idx = players.findIndex(p => p.id === newRecord.id);
        if (idx !== -1) {
          players[idx] = {
            id: newRecord.id,
            name: newRecord.name,
            cat: newRecord.category,
            tier: newRecord.tier,
            region: newRecord.region,
            tester: newRecord.tester
          };
        }
      } else if (eventType === 'DELETE') {
        const idx = players.findIndex(p => p.id === oldRecord.id);
        if (idx !== -1) players.splice(idx, 1);
      }
      
      // Re-process and re-render
      processedData = processData();
      render();
    }

    // =============================================
    // AUTHENTICATION
    // =============================================
    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      currentUser = session?.user || null;
      updateAdminUI();
    }

    async function signIn(email, password) {
      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email, password
        });
        
        if (error) throw error;
        
        currentUser = data.user;
        updateAdminUI();
        showToast('Signed in successfully!');
      } catch (err) {
        showToast(err.message || 'Sign in failed', 'error');
      }
    }

    async function signOut() {
      await supabase.auth.signOut();
      currentUser = null;
      updateAdminUI();
      showToast('Signed out');
    }

    function updateAdminUI() {
      const authForm = document.getElementById('authForm');
      const adminPanel = document.getElementById('adminPanel');
      const adminSubtitle = document.getElementById('adminSubtitle');
      
      if (currentUser) {
        authForm.classList.add('hidden');
        adminPanel.classList.remove('hidden');
        adminSubtitle.textContent = `Logged in as ${currentUser.email}`;
      } else {
        authForm.classList.remove('hidden');
        adminPanel.classList.add('hidden');
        adminSubtitle.textContent = 'Sign in to manage rankings';
      }
    }

    // =============================================
    // DATA PROCESSING
    // =============================================
    function processData() {
      const map = new Map();
      
      players.forEach(p => {
        if (!CATEGORIES.includes(p.cat)) return;
        
        if (!map.has(p.name)) {
          map.set(p.name, { 
            name: p.name, 
            region: p.region || '—', 
            tester: !!p.tester, 
            tiers: {}, 
            points: 0 
          });
        }
        
        const entry = map.get(p.name);
        const curTier = entry.tiers[p.cat];
        
        if (!curTier || getPoints(p.tier) > getPoints(curTier)) {
          entry.tiers[p.cat] = p.tier;
        }
        
        // Keep tester flag if any entry has it
        if (p.tester) entry.tester = true;
      });
      
      for (let p of map.values()) {
        let pts = 0;
        Object.values(p.tiers).forEach(t => pts += getPoints(t));
        p.points = pts;
        p.title = getTitle(pts);
      }
      
      return { 
        list: Array.from(map.values()).sort((a, b) => b.points - a.points || a.name.localeCompare(b.name)), 
        map 
      };
    }

    // =============================================
    // RENDERING
    // =============================================
    const overallView = document.getElementById("overallView");
    const tierView = document.getElementById("tierView");
    const searchInput = document.getElementById("searchInput");
    const pageTitle = document.getElementById("pageTitle");
    
    let currentFilter = "overall";
    let processedData = { list: [], map: new Map() };

    function showLoading() {
      overallView.innerHTML = `
        <div class="loading-container">
          <div class="spinner"></div>
          <div>Loading rankings...</div>
        </div>
      `;
    }

    function showError(message) {
      overallView.innerHTML = `
        <div class="error-container">
          <div class="error-icon">⚠️</div>
          <div class="error-title">Failed to load rankings</div>
          <div class="error-msg">${message}</div>
          <button class="btn-retry" onclick="initApp()">Retry</button>
        </div>
      `;
    }

    function render() {
      const term = searchInput.value.toLowerCase();
      pageTitle.textContent = currentFilter.charAt(0).toUpperCase() + currentFilter.slice(1);

      if (currentFilter === "overall") {
        tierView.classList.add("hidden");
        overallView.classList.remove("hidden");
        renderOverall(term);
      } else {
        overallView.classList.add("hidden");
        tierView.classList.remove("hidden");
        renderTier(term);
      }
    }

    function renderOverall(term) {
      overallView.innerHTML = "";
      const filtered = processedData.list.filter(p => p.name.toLowerCase().includes(term));
      
      if (!filtered.length) {
        overallView.innerHTML = `<div style="text-align:center;padding:40px;color:#555;">No players found.</div>`;
        return;
      }

      filtered.forEach((p, idx) => {
        const el = document.createElement("div");
        el.className = "player-card-row";
        
        const breakdownHtml = CATEGORIES.map(c => {
          const t = p.tiers[c] || "";
          return `<div class="mini-pill" data-tier="${t}" title="${c}">${t}</div>`;
        }).join('');

        el.innerHTML = `
          <div class="rank-num ${idx < 3 ? 'top-3' : ''}">#${idx + 1}</div>
          <div class="player-info">
            <img src="${getImageUrl(p.name, 'bust')}" class="player-head" loading="lazy" onerror="this.src='https://vzge.me/bust/X-Steve'">
            <div class="player-details">
              <div class="player-name">${p.name}</div>
              <div class="player-meta">
                ${p.tester ? '<span class="role-badge tester">TESTER</span>' : ''}
                <span class="role-badge">${p.region}</span>
                <span>${p.title}</span>
              </div>
            </div>
          </div>
          <div class="player-stats">
             <div class="tier-pills">${breakdownHtml}</div>
             <div class="stat-box">
               <div class="stat-label">Points</div>
               <div class="stat-value">${p.points}</div>
             </div>
          </div>
        `;
        el.onclick = () => openModal(p, idx + 1);
        overallView.appendChild(el);
      });
    }

    function renderTier(term) {
      tierView.innerHTML = "";
      const cols = [1, 2, 3, 4, 5];
      const tierMap = { 1: [], 2: [], 3: [], 4: [], 5: [] };
      
      const rawFiltered = players.filter(p => 
        p.cat === currentFilter && p.name.toLowerCase().includes(term)
      );
      
      rawFiltered.forEach(p => {
        const m = p.tier.match(/(\d)$/);
        if (m) {
          const t = parseInt(m[1]);
          if (tierMap[t]) tierMap[t].push(p);
        }
      });

      Object.keys(tierMap).forEach(k => {
        tierMap[k].sort((a, b) => {
          const aH = a.tier.startsWith("HT");
          const bH = b.tier.startsWith("HT");
          if (aH && !bH) return -1;
          if (!aH && bH) return 1;
          return a.name.localeCompare(b.name);
        });
      });

      cols.forEach(num => {
        const col = document.createElement("div");
        col.className = "tier-col";
        const items = tierMap[num];
        
        let html = `<div class="tier-header">TIER ${num}</div><div class="tier-list">`;
        
        if (items.length === 0) {
          html += `<div style="padding:20px;text-align:center;font-size:0.8rem;color:#444;">—</div>`;
        } else {
          items.forEach(p => {
            html += `
              <div class="tier-player" onclick="findAndOpen('${p.name}')">
                <img src="${getImageUrl(p.name, 'face')}" class="tp-head" loading="lazy" onerror="this.src='https://vzge.me/face/X-Steve'">
                <div class="tp-name">${p.name}</div>
                <div class="tp-badge" data-tier="${p.tier}">${p.tier}</div>
              </div>
            `;
          });
        }
        
        html += `</div>`;
        col.innerHTML = html;
        tierView.appendChild(col);
      });
    }

    // =============================================
    // MODALS
    // =============================================
    const modalBackdrop = document.getElementById("modalBackdrop");
    const mClose = document.getElementById("mClose");
    
    function openModal(data, rank) {
      const mHead = document.getElementById("mHead");
      mHead.src = getImageUrl(data.name, 'bust');
      mHead.onerror = function() { this.src = 'https://vzge.me/bust/X-Steve'; };

      document.getElementById("mName").textContent = data.name;
      document.getElementById("mTesterRow").classList.toggle("hidden", !data.tester);
      document.getElementById("mTitle").textContent = data.title;
      
      const rankEl = document.getElementById("mRank");
      rankEl.textContent = rank ? `#${rank}` : '-';
      rankEl.classList.toggle("glow", rank && rank <= 3);

      document.getElementById("mPoints").textContent = data.points;
      document.getElementById("mRegion").textContent = data.region || '-';
      
      const bd = document.getElementById("mBreakdown");
      bd.innerHTML = "";
      
      CATEGORIES.forEach(c => {
        const t = data.tiers[c] || "";
        const div = document.createElement("div");
        div.className = "bd-item";
        div.innerHTML = `
          <div class="bd-icon" title="${c}"><img src="${CAT_ICONS[c]}" alt="" onerror="this.style.display='none'"></div>
          <div class="bd-badge" data-tier="${t}">${t || '-'}</div>
        `;
        bd.appendChild(div);
      });
      
      modalBackdrop.classList.add("show");
    }

    function closeModal() { modalBackdrop.classList.remove("show"); }
    mClose.onclick = closeModal;
    modalBackdrop.onclick = (e) => { if (e.target === modalBackdrop) closeModal(); };

    function findAndOpen(name) {
      const p = processedData.map.get(name);
      if (p) {
        const idx = processedData.list.indexOf(p);
        openModal(p, idx + 1);
      }
    }

    // Info Modal
    const infoBtn = document.getElementById("infoBtn");
    const infoBackdrop = document.getElementById("infoBackdrop");
    const infoClose = document.getElementById("infoClose");
    
    infoBtn.onclick = () => infoBackdrop.classList.add("show");
    infoClose.onclick = () => infoBackdrop.classList.remove("show");
    infoBackdrop.onclick = (e) => { if (e.target === infoBackdrop) infoBackdrop.classList.remove("show"); };

    // Admin Modal
    const adminBtn = document.getElementById("adminBtn");
    const adminBackdrop = document.getElementById("adminBackdrop");
    const adminClose = document.getElementById("adminClose");
    
    adminBtn.onclick = () => adminBackdrop.classList.add("show");
    adminClose.onclick = () => adminBackdrop.classList.remove("show");
    adminBackdrop.onclick = (e) => { if (e.target === adminBackdrop) adminBackdrop.classList.remove("show"); };

    // Admin Tabs
    document.querySelectorAll('.admin-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        const tabId = tab.dataset.tab;
        document.getElementById('addForm').classList.toggle('hidden', tabId !== 'add');
        document.getElementById('editForm').classList.toggle('hidden', tabId !== 'edit');
      };
    });

    // Auth
    document.getElementById('loginBtn').onclick = async () => {
      const email = document.getElementById('authEmail').value;
      const password = document.getElementById('authPassword').value;
      
      if (!email || !password) {
        showToast('Please enter email and password', 'error');
        return;
      }
      
      await signIn(email, password);
    };

    document.getElementById('logoutBtn').onclick = signOut;

    // Add Player Form
    document.getElementById('submitAdd').onclick = async () => {
      const name = document.getElementById('addName').value.trim();
      const category = document.getElementById('addCategory').value;
      const tier = document.getElementById('addTier').value;
      const region = document.getElementById('addRegion').value;
      const tester = document.getElementById('addTester').checked;
      
      if (!name) {
        showToast('Please enter a player name', 'error');
        return;
      }
      
      const btn = document.getElementById('submitAdd');
      btn.disabled = true;
      btn.textContent = 'Adding...';
      
      await addPlayer({ name, category, tier, region, tester });
      
      btn.disabled = false;
      btn.textContent = 'Add Player Entry';
      document.getElementById('addName').value = '';
    };

    // Edit Search
    const editSearch = document.getElementById('editSearch');
    const editResults = document.getElementById('editResults');
    
    editSearch.oninput = debounce(() => {
      const term = editSearch.value.toLowerCase();
      
      if (!term) {
        editResults.innerHTML = '<div style="text-align:center;color:#555;padding:20px;">Search for a player...</div>';
        return;
      }
      
      const matches = players.filter(p => p.name.toLowerCase().includes(term));
      
      if (!matches.length) {
        editResults.innerHTML = '<div style="text-align:center;color:#555;padding:20px;">No results</div>';
        return;
      }
      
      editResults.innerHTML = matches.slice(0, 20).map(p => `
        <div style="display:flex;align-items:center;gap:12px;padding:10px;background:#141414;border-radius:8px;margin-bottom:6px;border:1px solid #222;">
          <img src="${getImageUrl(p.name, 'face')}" style="width:28px;height:28px;border-radius:4px;" onerror="this.style.display='none'">
          <div style="flex:1;">
            <div style="font-weight:600;font-size:0.9rem;">${p.name}</div>
            <div style="font-size:0.75rem;color:#666;">${p.cat} • ${p.tier}</div>
          </div>
          <button onclick="deletePlayer('${p.id}', '${p.name}')" style="padding:6px 10px;border-radius:6px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.1);color:#ef4444;font-size:0.75rem;font-weight:600;cursor:pointer;">Delete</button>
        </div>
      `).join('');
    }, 300);

    // Navigation
    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(".nav-btn").forEach(b => b.setAttribute("aria-pressed", "false"));
        btn.setAttribute("aria-pressed", "true");
        currentFilter = btn.dataset.filter;
        render();
        
        if (window.innerWidth < 768) {
          btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
      };
    });
    
    const debouncedRender = debounce(render, 200);
    searchInput.oninput = debouncedRender;

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (modalBackdrop.classList.contains('show')) closeModal();
        if (infoBackdrop.classList.contains('show')) infoBackdrop.classList.remove('show');
        if (adminBackdrop.classList.contains('show')) adminBackdrop.classList.remove('show');
      }
    });

    // =============================================
    // INITIALIZATION
    // =============================================
    async function initApp() {
      showLoading();
      
      // Check authentication
      await checkAuth();
      
      // Setup auth state listener
      supabase.auth.onAuthStateChange((event, session) => {
        currentUser = session?.user || null;
        updateAdminUI();
      });
      
      // Load data
      const success = await loadPlayers();
      
      if (!success) {
        showError('Could not connect to database. Please check your Supabase configuration.');
        return;
      }
      
      // Process and render
      processedData = processData();
      render();
      
      // Setup realtime
      setupRealtimeSubscription();
    }

    // Start the app
    initApp();
  </script>

<script src="https://static.app/js/static.js" type="text/javascript"></script>
</body>
</html>
